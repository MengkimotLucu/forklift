<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
            <stop offset="0%" stop-color="#34495e" />
            <stop offset="100%" stop-color="#1e272e" />
        </radialGradient>
    </defs>
    <!-- Background Circle -->
    <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="#C0392B" stroke-width="12" />
    
    <!-- Stylized Forklift Graphic -->
    <!-- Mast -->
    <rect x="140" y="100" width="20" height="280" fill="#ffffff" rx="5" />
    <rect x="155" y="140" width="10" height="200" fill="#DFE6E9" />
    
    <!-- Forks (Tines) -->
    <path d="M 140 310 L 60 310 L 60 330 L 140 330 Z" fill="#ffffff" />
    <path d="M 60 330 L 40 330 L 40 325 L 60 325 Z" fill="#ffffff" />
    
    <!-- Forklift Body / Cabin -->
    <path d="M 180 340 L 380 340 C 410 340 430 320 430 290 L 430 250 C 430 240 420 230 410 230 L 330 230 L 260 140 C 250 130 235 130 225 140 L 180 195 Z" fill="#C0392B" />
    
    <!-- Cabin Window/Roof (Dark space) -->
    <path d="M 200 200 L 235 155 C 240 150 248 150 253 155 L 315 230 L 200 230 Z" fill="#1e272e" stroke="#ffffff" stroke-width="8" stroke-linejoin="round" />
    
    <!-- Counterweight / Back detail -->
    <rect x="380" y="250" width="40" height="70" fill="#2d3436" rx="5" />
    
    <!-- Wheels -->
    <!-- Rear Wheel -->
    <circle cx="360" cy="350" r="50" fill="#2d3436" stroke="#ffffff" stroke-width="10" />
    <circle cx="360" cy="350" r="20" fill="#C0392B" />
    <!-- Front Wheel -->
    <circle cx="210" cy="350" r="50" fill="#2d3436" stroke="#ffffff" stroke-width="10" />
    <circle cx="210" cy="350" r="20" fill="#C0392B" />
</svg>
